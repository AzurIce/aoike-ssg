[package]
name = "aoike-obsidian"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "aoike-obsidian"
path = "src/main.rs"

[dependencies]
aoike = { path = "../..", default-features = false }
pulldown-cmark = "0.13.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.8"
walkdir = "2.5"
ignore = "0.4"
clap = { version = "4.5", features = ["derive"] }
rayon = "1.11"
regex = "1.11"
slug = "0.1.6"
anyhow = "1.0"
time = { version = "0.3.43", features = ["serde"] }
