[package]
name = "aoike-leptos"
version = "0.1.0"
authors = ["AzurIce <973562770@qq.com>"]
edition = "2024"

[dependencies]
anyhow = "1.0.100"
aoike.workspace = true
leptos = { version = "0.8.15", features = ["csr", "nightly"] }
leptos_router = { version = "0.8.11", features = ["nightly"] }
leptos_meta = "0.8.5"
time = { version = "0.3.43", features = ["wasm-bindgen", "serde"] }
wasm-bindgen = "0.2"
enclose = "1.2.1"

zip = { version = "6.0.0", optional = true }
sha1 = "0.10.6"

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
gloo-net = "0.6"
stylers = "0.3.2"
